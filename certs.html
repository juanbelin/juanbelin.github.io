<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Certificaciones | JuanBelin</title>
    <link rel="stylesheet" href="assets/css/landing.css">
    <link rel="icon" type="image/jpg" href="assets/img/favicons/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #0f1720;
            --card: #0b1220;
            --accent: #06b6d4;
            --muted: #9ca3af;
        }

        /* Estilos para el encabezado superior */
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            z-index: 100;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(6, 182, 212, 0.3);
        }

        .sprint-box {
            max-width: 300px;
            background: rgba(6, 182, 212, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sprint-title {
            color: var(--accent);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sprint-text {
            font-size: 13px;
            line-height: 1.5;
            color: #cbd5e1;
            margin: 0;
        }

        /* Estilos del contenedor de certificados */
        .certs-container {
            width: 100%;
            padding: 48px 36px;
            border-radius: 18px;
            box-shadow: 0 12px 50px rgba(2, 6, 23, 0.6);
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(6px) saturate(120%);
        }

        .certs-title {
            font-size: 32px;
            font-weight: 700;
            color: #e6f0fb;
            margin: 0;
        }

        .carousel {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        .carousel-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 30px rgba(6, 182, 212, 0.05);
        }

        .cert-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            cursor: pointer;
        }

        .cert-image.active {
            opacity: 1;
            transform: translateX(0);
            position: relative;
        }

        .btn {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent);
            width: 60px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        .indicators {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            width: 35px;
            border-radius: 6px;
        }

        .cert-info {
            text-align: center;
            margin-top: 10px;
        }

        .wrap {
            width: 100%;
            max-width: 1000px;
            margin: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: linear-gradient(180deg, #071022 0%, #0b1220 100%);
            color: #e6eef8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .top-nav {
                position: relative;
                top: 0;
                right: 0;
                align-items: center;
                padding: 20px;
                width: 100%;
            }
            body { flex-direction: column; overflow-y: auto; }
            .carousel-content { height: 250px; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-buttons">
            <button onclick="window.location.href='index.html'" class="nav-btn">
                <i class="fas fa-home"></i> Home
            </button>
            <button onclick="window.location.href='main.html'" class="nav-btn">
                <i class="fas fa-id-card"></i> Personal Card
            </button>
        </div>
        
        <div class="sprint-box">
            <div class="sprint-title">
                <i class="fas fa-running"></i> Recent Sprint
            </div>
            <p class="sprint-text">
                Currently improving my Red Team and evasion skills while working on labs and CTFs on platforms like HackTheBox.
            </p>
        </div>
    </div>

    <main class="wrap">
        <div class="certs-container">
            <h1 class="certs-title">Owned Certifications</h1>

            <div class="carousel">
                <button class="btn" onclick="previousCert()">❮</button>
                <div class="carousel-content">
                    <img src="/assets/img/Anexos/CPTS2.png" alt="CPTS" class="cert-image active">
                    <img src="/assets/img/Anexos/CRTA.png" alt="CRTA" class="cert-image">
                    <img src="/assets/img/Anexos/eJPT_cert.png" alt="eJPT" class="cert-image">
                </div>
                <button class="btn" onclick="nextCert()">❯</button>
            </div>

            <div class="indicators">
                <span class="dot active" onclick="goToCert(0)"></span>
                <span class="dot" onclick="goToCert(1)"></span>
                <span class="dot" onclick="goToCert(2)"></span>
            </div>

            <div class="cert-info">
                <div class="cert-name" id="certName" style="font-weight: bold; font-size: 22px;">CPTS</div>
                <div class="cert-organization" id="certOrg" style="color: var(--muted);">Hack The Box</div>
            </div>
        </div>
    </main>

    <script>
        const certs = [
            { name: 'CPTS', org: 'Hack The Box' },
            { name: 'CRTA', org: 'Cyber Warfare Labs' },
            { name: 'eJPTv2', org: 'INE' }
        ];

        let currentIndex = 0;

        function updateCarousel() {
            const images = document.querySelectorAll('.cert-image');
            const dots = document.querySelectorAll('.dot');

            images.forEach((img, index) => {
                img.classList.toggle('active', index === currentIndex);
            });

            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });

            document.getElementById('certName').textContent = certs[currentIndex].name;
            document.getElementById('certOrg').textContent = certs[currentIndex].org;
        }

        function nextCert() {
            currentIndex = (currentIndex + 1) % certs.length;
            updateCarousel();
        }

        function previousCert() {
            currentIndex = (currentIndex - 1 + certs.length) % certs.length;
            updateCarousel();
        }

        function goToCert(index) {
            currentIndex = index;
            updateCarousel();
        }
    </script>
</body>
</html>
